name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install (locked)
        run: uv sync --locked
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Architecture
        run: uv run lint-imports
      - name: Types
        run: uv run mypy packages apps tests
      - name: Tests (incl. bias guards)
        run: uv run pytest -q -m "not network"

  # Non-gating: rebuild the Workstation SPA and flag if the committed assets are stale. The Python
  # job above never runs Node — it serves the committed build in src/alpha_web/static/app.
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build SPA
        working-directory: apps/alpha-web/frontend
        run: npm ci && npm run build
      - name: Warn if committed assets are stale
        run: |
          if ! git diff --quiet -- apps/alpha-web/src/alpha_web/static/app; then
            echo "::warning::Committed SPA assets differ from a fresh build; run 'npm run build' and commit static/app."
          fi
