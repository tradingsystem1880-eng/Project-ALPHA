[project]
name = "alpha-validation"
version = "1.0.0"
description = "Statistical validation gauntlet + quantstats tear sheet."
requires-python = ">=3.12"
dependencies = [
    "alpha-core",
    "numpy>=2.4.6",
    "scipy>=1.17.1",
    "pandas>=2.0",
    "quantstats-lumi>=1.1.5",
]

[tool.uv.sources]
alpha-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_validation"]
