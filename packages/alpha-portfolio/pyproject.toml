[project]
name = "alpha-portfolio"
version = "0.0.0"
description = "Pure multi-asset portfolio-optimization primitives (core only; composed by the CLI)."
requires-python = ">=3.12"
dependencies = ["alpha-core", "numpy>=2.4.6", "skfolio>=0.10"]

[tool.uv.sources]
alpha-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_portfolio"]
