[project]
name = "alpha-core"
version = "1.0.0"
description = "Domain types, protocols, errors, and config for Project ALPHA."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_core"]
