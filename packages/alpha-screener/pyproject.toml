[project]
name = "alpha-screener"
version = "1.0.0"
description = "Screener & news via finnhub (opt-in, API-key-gated). Pure parsers; the one network edge."
requires-python = ">=3.12"
dependencies = [
    "alpha-core",
    "finnhub-python>=2.4",
]

[tool.uv.sources]
alpha-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_screener"]
