[project]
name = "alpha-forecast"
version = "1.0.0"
description = "Foundation-model bar forecasting (vendored Kronos; sanctioned pandas edge)."
requires-python = ">=3.12"
dependencies = [
    "alpha-core",
    "numpy>=2.4.6",
    "polars>=1.0",
]

[project.optional-dependencies]
# The torch stack is opt-in: `uv sync --group kronos` at the workspace root. Everything in
# alpha_forecast outside _vendor/ and the lazy model-load path works without it.
kronos = [
    "torch>=2.0",
    "einops>=0.8.1",
    "huggingface_hub>=0.33",
    "safetensors>=0.4",
    "pandas>=2.0",
    "tqdm>=4.66",
]

[tool.uv.sources]
alpha-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_forecast"]
