[project]
name = "alpha-paper"
version = "0.0.0"
description = "Paper trading: nautilus SandboxExecutionClient sessions + on-disk run artifacts (Phase 4)."
requires-python = ">=3.12"
dependencies = ["alpha-core", "nautilus-trader>=1.228", "polars>=1.0"]

[tool.uv.sources]
alpha-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_paper"]
