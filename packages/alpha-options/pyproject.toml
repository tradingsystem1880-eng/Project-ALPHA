[project]
name = "alpha-options"
version = "1.0.0"
description = "Options & derivatives analytics: Black-Scholes pricing, greeks, implied volatility."
requires-python = ">=3.12"
dependencies = [
    "alpha-core",
    "numpy>=2.4.6",
    "scipy>=1.17.1",
]

[tool.uv.sources]
alpha-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/alpha_options"]
